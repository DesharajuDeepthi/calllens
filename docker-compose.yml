services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calllens
      POSTGRES_USER: calllens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calllens_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calllens -d calllens"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: calllens
      POSTGRES_USER: calllens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calllens_dev}
      POSTGRES_APP_USER: calllens_app
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-calllens_app_dev}
      REDIS_URL: redis://redis:6379/0
      DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      DEFAULT_TENANT_SLUG: aegiscloud
      TRANSCRIPT_DATA_PATH: /data/raaw
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLASSIFIER_CONFIDENCE_THRESHOLD: ${CLASSIFIER_CONFIDENCE_THRESHOLD:-0.7}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-32-char-random-string}
    volumes:
      # Mount the real transcript data read-only
      - "/Users/deepthidesharaju/Documents/Transcript Intelligence/data:/data:ro"
      # Mount source so code changes don't require a rebuild during dev
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp:
    build: .
    entrypoint: uvicorn
    command: >
      calllens.mcp.server:app
        --host 0.0.0.0
        --port 8001
        --reload
        --log-level info
    ports:
      - "8001:8001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: calllens
      POSTGRES_USER: calllens_app
      POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD:-calllens_app_dev}
      POSTGRES_APP_USER: calllens_app
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-calllens_app_dev}
      REDIS_URL: redis://redis:6379/0
      DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      DEFAULT_TENANT_SLUG: aegiscloud
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-32-char-random-string}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
